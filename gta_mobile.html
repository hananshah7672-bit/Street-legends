<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Street Legends — GTA Mobile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#0a0a0a;overflow:hidden;font-family:'Rajdhani',sans-serif;touch-action:none;}
  canvas{display:block;}

  /* HUD */
  #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

  /* Top bar */
  #topbar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:8px 12px;}

  #money-box{background:rgba(0,0,0,.75);border:1px solid #2a2a2a;border-radius:8px;padding:6px 14px;}
  #money-val{font-family:'Oswald',sans-serif;font-size:22px;color:#4dff91;letter-spacing:1px;}

  #wanted-box{display:flex;gap:4px;background:rgba(0,0,0,.75);border:1px solid #2a2a2a;border-radius:8px;padding:8px 10px;align-items:center;}
  .star{font-size:18px;color:#333;transition:color .3s;}
  .star.on{color:#ffd700;text-shadow:0 0 8px #ffd700;}

  #stats-box{background:rgba(0,0,0,.75);border:1px solid #2a2a2a;border-radius:8px;padding:6px 12px;min-width:100px;text-align:right;}
  #speed-val{font-family:'Oswald',sans-serif;font-size:20px;color:#fff;}
  #speed-unit{font-size:11px;color:#888;}

  /* Health & Fuel bars */
  #bars{position:absolute;bottom:170px;left:12px;width:160px;}
  .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .bar-label{font-size:11px;color:#aaa;width:36px;}
  .bar-bg{flex:1;height:10px;background:#1a1a1a;border-radius:5px;overflow:hidden;border:1px solid #333;}
  .bar-fill{height:100%;border-radius:5px;transition:width .2s;}
  #hp-fill{background:linear-gradient(90deg,#ff4444,#ff8800);}
  #fuel-fill{background:linear-gradient(90deg,#ffaa00,#ffee00);}

  /* Vehicle info */
  #vehicle-info{position:absolute;bottom:170px;right:12px;background:rgba(0,0,0,.8);border:1px solid #333;border-radius:8px;padding:8px 12px;text-align:center;}
  #vehicle-name{font-family:'Oswald',sans-serif;font-size:14px;color:#4daaff;letter-spacing:1px;}
  #vehicle-gear{font-size:11px;color:#888;margin-top:2px;}

  /* Mission box */
  #mission-box{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:2px solid #ffd700;border-radius:10px;padding:10px 20px;text-align:center;min-width:240px;display:none;}
  #mission-title{font-family:'Oswald',sans-serif;font-size:16px;color:#ffd700;letter-spacing:2px;}
  #mission-desc{font-size:13px;color:#ccc;margin-top:4px;}
  #mission-progress{font-size:12px;color:#4dff91;margin-top:4px;}

  /* Notification */
  #notif{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.9);border:2px solid #ffd700;border-radius:12px;padding:16px 32px;text-align:center;font-family:'Oswald',sans-serif;font-size:22px;color:#ffd700;letter-spacing:3px;display:none;pointer-events:none;}

  /* Minimap */
  #minimap{position:absolute;top:70px;right:12px;width:110px;height:110px;border:2px solid #333;border-radius:8px;overflow:hidden;background:#111;}
  #minimap canvas{width:100%;height:100%;}

  /* Controls */
  #controls{position:absolute;bottom:0;left:0;right:0;height:165px;pointer-events:all;}

  /* Arrow buttons */
  #arrows{position:absolute;left:12px;bottom:12px;width:150px;height:150px;}
  .arrow-btn{position:absolute;width:48px;height:48px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,.8);user-select:none;cursor:pointer;transition:background .1s;}
  .arrow-btn:active,.arrow-btn.pressed{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.6);}
  #btn-up   {top:0;   left:51px;}
  #btn-down {top:102px;left:51px;}
  #btn-left {top:51px;left:0;}
  #btn-right{top:51px;left:102px;}

  /* Action buttons */
  #action-btns{position:absolute;right:12px;bottom:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .action-btn{width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;user-select:none;text-align:center;line-height:1.2;}
  .action-btn:active{filter:brightness(1.4);}
  #btn-enter {background:rgba(77,255,145,.15);border-color:#4dff91;color:#4dff91;}
  #btn-shoot {background:rgba(255,60,60,.15);border-color:#ff3c3c;color:#ff3c3c;}
  #btn-mission{background:rgba(255,215,0,.15);border-color:#ffd700;color:#ffd700;font-size:10px;}
  #btn-refuel{background:rgba(255,170,0,.15);border-color:#ffaa00;color:#ffaa00;font-size:10px;}

  /* Screen overlays */
  #screen-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,.92);}
  #screen-overlay h1{font-family:'Oswald',sans-serif;font-size:48px;color:#ffd700;letter-spacing:6px;text-shadow:0 0 30px #ffd70066;}
  #screen-overlay p{color:#aaa;margin-top:12px;font-size:16px;text-align:center;padding:0 30px;}
  #start-btn{margin-top:30px;padding:14px 48px;background:#ffd700;color:#000;font-family:'Oswald',sans-serif;font-size:20px;letter-spacing:3px;border:none;border-radius:8px;cursor:pointer;font-weight:700;}
  #start-btn:active{transform:scale(.96);}
  .subtitle{color:#666;font-size:13px;margin-top:8px;}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="screen-overlay">
  <h1>STREET LEGENDS</h1>
  <p class="subtitle">GTA-Style Mobile Game</p>
  <p>Cars • Bikes • Missions • Gang Wars • Fuel System</p>
  <button id="start-btn" onclick="startGame()">TAP TO PLAY</button>
</div>

<!-- Game Canvas -->
<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud" style="display:none;">
  <div id="topbar">
    <div id="money-box"><span id="money-val">$0</span></div>
    <div id="wanted-box">
      <span class="star" id="s1">★</span><span class="star" id="s2">★</span>
      <span class="star" id="s3">★</span><span class="star" id="s4">★</span>
      <span class="star" id="s5">★</span>
    </div>
    <div id="stats-box">
      <div id="speed-val">0</div>
      <div id="speed-unit">KM/H</div>
    </div>
  </div>

  <div id="minimap"><canvas id="mc" width="110" height="110"></canvas></div>

  <div id="mission-box">
    <div id="mission-title">MISSION</div>
    <div id="mission-desc">Description</div>
    <div id="mission-progress"></div>
  </div>

  <div id="bars">
    <div class="bar-row"><span class="bar-label">HP</span><div class="bar-bg"><div class="bar-fill" id="hp-fill" style="width:100%"></div></div></div>
    <div class="bar-row"><span class="bar-label">FUEL</span><div class="bar-bg"><div class="bar-fill" id="fuel-fill" style="width:100%"></div></div></div>
  </div>

  <div id="vehicle-info">
    <div id="vehicle-name">ON FOOT</div>
    <div id="vehicle-gear">—</div>
  </div>

  <div id="notif"></div>

  <div id="controls">
    <!-- Arrow pad -->
    <div id="arrows">
      <div class="arrow-btn" id="btn-up">▲</div>
      <div class="arrow-btn" id="btn-down">▼</div>
      <div class="arrow-btn" id="btn-left">◀</div>
      <div class="arrow-btn" id="btn-right">▶</div>
    </div>
    <!-- Action buttons -->
    <div id="action-btns">
      <div class="action-btn" id="btn-enter">ENTER<br>CAR</div>
      <div class="action-btn" id="btn-shoot">SHOOT</div>
      <div class="action-btn" id="btn-mission">MISSION</div>
      <div class="action-btn" id="btn-refuel">REFUEL</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STREET LEGENDS — Full GTA Mobile Engine
// ═══════════════════════════════════════════════

const gc = document.getElementById('gc');
const ctx = gc.getContext('2d');
const mc  = document.getElementById('mc');
const mctx= mc.getContext('2d');

let W, H;
function resize(){
  W = gc.width  = window.innerWidth;
  H = gc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Input state ─────────────────────────────────
const keys = {up:false,down:false,left:false,right:false,shoot:false,enter:false,mission:false,refuel:false};

function bindBtn(id, key){
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e=>{e.preventDefault();keys[key]=true;el.classList.add('pressed');}, {passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault();keys[key]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown',  ()=>{keys[key]=true;el.classList.add('pressed');});
  el.addEventListener('mouseup',    ()=>{keys[key]=false;el.classList.remove('pressed');});
}
bindBtn('btn-up','up'); bindBtn('btn-down','down');
bindBtn('btn-left','left'); bindBtn('btn-right','right');
bindBtn('btn-shoot','shoot'); bindBtn('btn-enter','enter');
bindBtn('btn-mission','mission'); bindBtn('btn-refuel','refuel');

// keyboard
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowUp'||e.key==='w')  keys.up=true;
  if(e.key==='ArrowDown'||e.key==='s') keys.down=true;
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=true;
  if(e.key==='f') keys.shoot=true;
  if(e.key==='e') keys.enter=true;
  if(e.key==='m') keys.mission=true;
  if(e.key==='r') keys.refuel=true;
});
document.addEventListener('keyup', e=>{
  if(e.key==='ArrowUp'||e.key==='w')  keys.up=false;
  if(e.key==='ArrowDown'||e.key==='s') keys.down=false;
  if(e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.right=false;
  if(e.key==='f') keys.shoot=false;
  if(e.key==='e') keys.enter=false;
  if(e.key==='m') keys.mission=false;
  if(e.key==='r') keys.refuel=false;
});

// One-shot key detection
let prevKeys = {};
function keyPressed(k){ const v = keys[k] && !prevKeys[k]; return v; }

// ── World constants ──────────────────────────────
const TILE = 60;
const WORLD = 30; // 30x30 tiles
const WS = WORLD * TILE;

// ── Camera ──────────────────────────────────────
const cam = {x:0, y:0};

// ── City map ────────────────────────────────────
// 0=road, 1=building, 2=pavement, 3=park, 4=gas station
const MAP_DATA = [];
function buildMap(){
  for(let r=0;r<WORLD;r++){
    MAP_DATA[r]=[];
    for(let c=0;c<WORLD;c++){
      // Roads every 6 tiles
      if(r%6===0||c%6===0) MAP_DATA[r][c]=0;
      else if(r%6===1||c%6===1) MAP_DATA[r][c]=2;
      else MAP_DATA[r][c]=1;
    }
  }
  // Gas stations
  [[6,6],[18,18],[6,24],[24,6]].forEach(([r,c])=>{
    MAP_DATA[r][c]=4; MAP_DATA[r][c+1]=4;
    MAP_DATA[r+1][c]=4; MAP_DATA[r+1][c+1]=4;
  });
  // Parks
  [[12,12],[12,13],[13,12],[13,13]].forEach(([r,c])=>MAP_DATA[r][c]=3);
}
buildMap();

const TILE_COLORS = ['#2a2a2a','#3a3550','#c8beb0','#2d5a27','#e8a020'];
const TILE_STROKE = ['#1a1a1a','#2a2640','#b8ae9e','#1d4a17','#c87000'];

// ── Buildings ────────────────────────────────────
const BUILDINGS=[];
function buildBuildings(){
  const colors=['#4a4060','#506060','#605040','#404850','#584040','#405040'];
  for(let r=0;r<WORLD;r++){
    for(let c=0;c<WORLD;c++){
      if(MAP_DATA[r][c]===1){
        const h=30+Math.random()*80;
        BUILDINGS.push({
          x:c*TILE+4, y:r*TILE+4,
          w:TILE-8, h:TILE-8,
          height:h,
          color:colors[Math.floor(Math.random()*colors.length)],
          windows: Math.random()>.3
        });
      }
    }
  }
}
buildBuildings();

// ── Player ───────────────────────────────────────
const player = {
  x: WS/2, y: WS/2,
  angle: 0,
  speed: 0,
  hp: 100,
  maxHp: 100,
  money: 0,
  wanted: 0,
  inVehicle: null,
  shootCD: 0,
  ammo: 60,
  invincible: 0,
  radius: 10
};

// ── Vehicles ─────────────────────────────────────
const VEHICLES = [];
function spawnVehicles(){
  const types=[
    {name:'Sedan',    color:'#e33',  speed:4.5, accel:0.12, brake:0.18, steer:2.8, fuel:100, maxFuel:100, radius:18, type:'car'},
    {name:'Sports',   color:'#3af',  speed:7,   accel:0.20, brake:0.22, steer:3.2, fuel:80,  maxFuel:80,  radius:18, type:'car'},
    {name:'Truck',    color:'#a83',  speed:3,   accel:0.07, brake:0.12, steer:2.0, fuel:150, maxFuel:150, radius:24, type:'truck'},
    {name:'Motorbike',color:'#f80',  speed:8,   accel:0.25, brake:0.30, steer:4.5, fuel:50,  maxFuel:50,  radius:12, type:'bike'},
    {name:'Chopper',  color:'#222',  speed:7,   accel:0.22, brake:0.28, steer:4.0, fuel:55,  maxFuel:55,  radius:13, type:'bike'},
    {name:'Van',      color:'#48a',  speed:3.5, accel:0.08, brake:0.14, steer:2.2, fuel:120, maxFuel:120, radius:22, type:'van'},
  ];
  const spots=[
    [WS/2-200,WS/2-60],[WS/2+100,WS/2-120],[WS/2-300,WS/2+200],
    [WS/2+300,WS/2+100],[WS/2-100,WS/2+300],[WS/2+200,WS/2-300],
    [WS/2-400,WS/2],[WS/2,WS/2-400],[WS/2+400,WS/2+400],
  ];
  spots.forEach((s,i)=>{
    const t=types[i%types.length];
    VEHICLES.push({...t, x:s[0], y:s[1], angle:Math.random()*Math.PI*2,
      vx:0, vy:0, speed:0, stolen:false, id:i});
  });
}
spawnVehicles();

// ── NPCs ─────────────────────────────────────────
const NPCS=[];
function spawnNPCs(){
  const names=['Ali','Sara','Raza','Zara','Omar','Hina'];
  const colors=['#f4a','#4af','#af4','#fa4','#a4f','#4fa'];
  for(let i=0;i<20;i++){
    NPCS.push({
      x: 200+Math.random()*(WS-400),
      y: 200+Math.random()*(WS-400),
      angle: Math.random()*Math.PI*2,
      speed: 0.5+Math.random()*0.8,
      color: colors[i%colors.length],
      name: names[i%names.length],
      timer: Math.random()*200,
      scared: false, scaredTimer:0,
      radius:8
    });
  }
}
spawnNPCs();

// ── Enemies ──────────────────────────────────────
const ENEMIES=[];
function spawnEnemies(){
  const gangs=[
    {color:'#ff2244',outline:'#ff6677',name:'Red Devils'},
    {color:'#2244ff',outline:'#6677ff',name:'Blue Crew'},
    {color:'#ff8800',outline:'#ffbb44',name:'Orange Gang'},
  ];
  for(let i=0;i<12;i++){
    const g=gangs[i%3];
    ENEMIES.push({
      x: 150+Math.random()*(WS-300),
      y: 150+Math.random()*(WS-300),
      angle: Math.random()*Math.PI*2,
      speed: 1.5+Math.random()*1.5,
      hp: 60,
      maxHp: 60,
      state:'patrol',
      patrolX: 0, patrolY: 0,
      patrolTimer: 0,
      shootCD: 0,
      alertTimer: 0,
      color: g.color,
      outline: g.outline,
      gang: g.name,
      dead: false,
      radius: 10
    });
  }
  // Reset patrol targets
  ENEMIES.forEach(e=>{e.patrolX=e.x+(-100+Math.random()*200); e.patrolY=e.y+(-100+Math.random()*200);});
}
spawnEnemies();

// ── Bullets ──────────────────────────────────────
const BULLETS=[];

// ── Missions ─────────────────────────────────────
const MISSIONS=[
  {id:0, title:'GANG WAR',     desc:'Eliminate 4 Red Devils',  type:'kill',   target:'Red Devils', need:4,  done:0, reward:2000, markerX:WS/2+300, markerY:WS/2-300, state:'idle'},
  {id:1, title:'CAR HEIST',    desc:'Steal Sports car → deliver to marker', type:'deliver', need:1, done:0, reward:3000, markerX:WS/2-400, markerY:WS/2+400, state:'idle', deliverX:WS/2+500, deliverY:WS/2-200},
  {id:2, title:'TURF WAR',     desc:'Eliminate 6 Blue Crew',   type:'kill',   target:'Blue Crew',  need:6,  done:0, reward:4000, markerX:WS/2-300, markerY:WS/2-300, state:'idle'},
  {id:3, title:'BOSS TAKEDOWN',desc:'Eliminate 8 gang members', type:'kill',  target:'any',        need:8,  done:0, reward:8000, markerX:WS/2+200, markerY:WS/2+200, state:'idle'},
];
let activeMission=-1;
let totalKills=0;

// ── Notifications ────────────────────────────────
let notifText='', notifTimer=0;
function showNotif(txt, dur=2500){
  notifText=txt; notifTimer=dur;
  const n=document.getElementById('notif');
  n.textContent=txt; n.style.display='block';
}

// ── Utility ──────────────────────────────────────
const τ=Math.PI*2;
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
function angTo(from,to){return Math.atan2(to.y-from.y,to.x-from.x);}
function lerpA(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}
function tileAt(x,y){
  const c=Math.floor(x/TILE), r=Math.floor(y/TILE);
  if(c<0||c>=WORLD||r<0||r>=WORLD) return 1;
  return MAP_DATA[r][c];
}
function onRoad(x,y){ const t=tileAt(x,y); return t===0||t===2||t===4; }
function isGasStation(x,y){ return tileAt(x,y)===4; }

// ── Draw helpers ─────────────────────────────────
function drawIsoCar(cx,cy,angle,color,type,shadowOnly){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);

  if(shadowOnly){
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.beginPath(); ctx.ellipse(2,4,type==='bike'?10:18,type==='bike'?6:10,0,0,τ);
    ctx.fill(); ctx.restore(); return;
  }

  const isBike=type==='bike';
  const bw=isBike?10:26, bh=isBike?20:38;

  // Body
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.roundRect(-bw/2,-bh/2,bw,bh,4); ctx.fill();

  // Windows
  if(!isBike){
    ctx.fillStyle='rgba(150,220,255,.7)';
    ctx.fillRect(-8,-12,16,14);
  }

  // Wheels
  ctx.fillStyle='#111';
  if(isBike){
    ctx.fillRect(-6,-10,5,8); ctx.fillRect(-6,4,5,8);
    ctx.fillRect(1,-10,5,8);  ctx.fillRect(1,4,5,8);
  } else {
    ctx.fillRect(-bw/2-3,-bh/2+2,5,10); ctx.fillRect(bw/2-2,-bh/2+2,5,10);
    ctx.fillRect(-bw/2-3,bh/2-12,5,10); ctx.fillRect(bw/2-2,bh/2-12,5,10);
  }

  // Headlights
  ctx.fillStyle='#ffffaa';
  if(isBike){ ctx.fillRect(-3,-11,6,4); }
  else { ctx.fillRect(-9,-bh/2,8,4); ctx.fillRect(1,-bh/2,8,4); }

  // Brake lights
  ctx.fillStyle='#ff2200';
  if(!isBike){ ctx.fillRect(-9,bh/2-4,7,3); ctx.fillRect(2,bh/2-4,7,3); }

  ctx.restore();
}

function drawHumanoid(cx,cy,angle,color,outline,r){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(1,3,r,r/2,0,0,τ); ctx.fill();

  // Body
  ctx.fillStyle=outline||'#888';
  ctx.beginPath(); ctx.ellipse(0,2,r-1,r+2,0,0,τ); ctx.fill();
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.ellipse(0,1,r-2,r+1,0,0,τ); ctx.fill();

  // Head
  ctx.fillStyle='#d4a07a';
  ctx.beginPath(); ctx.arc(0,-r,r*0.65,0,τ); ctx.fill();

  ctx.restore();
}

// ── GAME UPDATE ──────────────────────────────────
let lastTime=0, dt=0;

function update(ts){
  dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;

  // ── Shooting cooldown
  if(player.shootCD>0) player.shootCD-=dt;
  if(player.invincible>0) player.invincible-=dt;

  const pInV = player.inVehicle!==null;
  const veh = pInV ? VEHICLES[player.inVehicle] : null;

  // ── Vehicle movement ─────────────────────────
  if(veh){
    // Acceleration
    if(keys.up)   veh.speed = Math.min(veh.speed+veh.accel, veh.maxSpeed||veh.speed+veh.accel>0?veh.speed+veh.accel:0);
    if(keys.down) veh.speed = Math.max(veh.speed-veh.brake, -(veh.maxSpeed||5)*0.5);
    if(!keys.up && !keys.down){
      veh.speed *= 0.95; // friction
      if(Math.abs(veh.speed)<0.05) veh.speed=0;
    }
    // Speed cap
    veh.speed = clamp(veh.speed, -4, veh.speed_max||8);

    // Steering (only when moving)
    if(Math.abs(veh.speed)>0.2){
      if(keys.left)  veh.angle -= veh.steer*dt*(veh.speed>0?1:-1);
      if(keys.right) veh.angle += veh.steer*dt*(veh.speed>0?1:-1);
    }

    // Move
    const nx=veh.x+Math.sin(veh.angle)*veh.speed;
    const ny=veh.y+Math.cos(veh.angle)*veh.speed; // note: forward = +cos(angle)
    // Wall check
    if(tileAt(nx,veh.y)!==1) veh.x=nx; else veh.speed*=-0.3;
    if(tileAt(veh.x,ny)!==1) veh.y=ny; else veh.speed*=-0.3;

    // Fuel consumption
    veh.fuel = Math.max(0, veh.fuel - Math.abs(veh.speed)*0.003);
    if(veh.fuel<=0) veh.speed=0;

    // Sync player
    player.x=veh.x; player.y=veh.y; player.angle=veh.angle;

    // Enter gas station
    if(keys.refuel && isGasStation(veh.x, veh.y)){
      const refillAmt = veh.maxFuel - veh.fuel;
      const cost = Math.ceil(refillAmt*2);
      if(player.money>=cost){
        veh.fuel=veh.maxFuel; player.money-=cost;
        showNotif(`⛽ REFUELED! -$${cost}`);
      } else showNotif('💸 NOT ENOUGH MONEY!');
    }

  } else {
    // ── On foot movement ─────────────────────────
    const spd=2.8;
    if(keys.up)    { player.y-=Math.cos(player.angle)*spd; player.x+=Math.sin(player.angle)*spd; }
    if(keys.down)  { player.y+=Math.cos(player.angle)*spd; player.x-=Math.sin(player.angle)*spd; }
    if(keys.left)  player.angle-=2.5*dt;
    if(keys.right) player.angle+=2.5*dt;

    // boundary
    player.x=clamp(player.x,10,WS-10); player.y=clamp(player.y,10,WS-10);
  }

  // ── Enter/Exit vehicle ────────────────────────
  if(keyPressed('enter')){
    if(!pInV){
      let closest=null, closestD=Infinity;
      VEHICLES.forEach((v,i)=>{
        const d=dist(player,v);
        if(d<50&&d<closestD){closestD=d;closest=i;}
      });
      if(closest!==null){
        player.inVehicle=closest;
        player.wanted=Math.min(5,player.wanted+(VEHICLES[closest].stolen?0:1));
        VEHICLES[closest].stolen=true;
        showNotif(`🚗 STOLE ${VEHICLES[closest].name.toUpperCase()}!`);
      }
    } else {
      player.inVehicle=null;
      showNotif('🚶 EXITED VEHICLE');
    }
  }

  // ── Shooting ─────────────────────────────────
  if(keys.shoot && player.shootCD<=0 && player.ammo>0){
    BULLETS.push({
      x:player.x, y:player.y,
      angle:player.angle,
      speed:10, life:60,
      fromPlayer:true
    });
    player.shootCD=0.2;
    player.ammo--;
    if(player.wanted===0) player.wanted=1;
  }

  // ── Bullets ───────────────────────────────────
  for(let i=BULLETS.length-1;i>=0;i--){
    const b=BULLETS[i];
    b.x+=Math.sin(b.angle)*b.speed;
    b.y-=Math.cos(b.angle)*b.speed;
    b.life--;
    if(b.life<=0||tileAt(b.x,b.y)===1){BULLETS.splice(i,1);continue;}

    if(b.fromPlayer){
      for(let j=ENEMIES.length-1;j>=0;j--){
        const e=ENEMIES[j];
        if(!e.dead&&dist(b,e)<14){
          e.hp-=30; BULLETS.splice(i,1);
          if(e.hp<=0){
            e.dead=true; totalKills++;
            player.money+=300;
            // mission progress
            if(activeMission>=0){
              const m=MISSIONS[activeMission];
              if(m.state==='active'&&(m.target==='any'||m.target===e.gang)){
                m.done++;
                if(m.done>=m.need){ completeMission(); }
              }
            }
          }
          break;
        }
      }
    } else {
      // enemy bullet hits player
      if(!pInV&&dist(b,player)<14&&player.invincible<=0){
        player.hp-=15; player.invincible=1.5;
        BULLETS.splice(i,1);
        if(player.hp<=0){ player.hp=0; gameOver(); }
      }
    }
  }

  // ── NPCs ──────────────────────────────────────
  NPCS.forEach(n=>{
    if(n.scared){
      n.scaredTimer-=dt;
      if(n.scaredTimer<=0) n.scared=false;
      const ang=angTo(n,player)+Math.PI;
      n.x+=Math.cos(ang)*2.5; n.y+=Math.sin(ang)*2.5;
    } else {
      n.timer-=dt;
      if(n.timer<=0){n.angle=Math.random()*τ; n.timer=2+Math.random()*4;}
      n.x+=Math.cos(n.angle)*n.speed; n.y+=Math.sin(n.angle)*n.speed;
    }
    n.x=clamp(n.x,20,WS-20); n.y=clamp(n.y,20,WS-20);
    // scare if player shoots nearby
    if(keys.shoot&&dist(n,player)<120){n.scared=true;n.scaredTimer=4;}
  });

  // ── Enemies ───────────────────────────────────
  ENEMIES.forEach(e=>{
    if(e.dead)return;
    const dp=dist(e,player);

    if(dp<200||player.wanted>=3) e.state='chase';
    else if(e.state==='chase'&&dp>280) e.state='patrol';

    if(e.state==='patrol'){
      const pdx=e.patrolX-e.x, pdy=e.patrolY-e.y;
      const pd=Math.sqrt(pdx*pdx+pdy*pdy);
      if(pd<10){ e.patrolX=150+Math.random()*(WS-300); e.patrolY=150+Math.random()*(WS-300); }
      else { const a=Math.atan2(pdy,pdx); e.x+=Math.cos(a)*e.speed*0.8; e.y+=Math.sin(a)*e.speed*0.8; e.angle=a+Math.PI/2; }
    } else {
      const a=angTo(e,player);
      e.x+=Math.cos(a)*e.speed*1.4;
      e.y+=Math.sin(a)*e.speed*1.4;
      e.angle=a+Math.PI/2;
      // shoot at player
      e.shootCD-=dt;
      if(dp<150&&e.shootCD<=0){
        BULLETS.push({x:e.x,y:e.y,angle:a+Math.PI/2,speed:7,life:50,fromPlayer:false});
        e.shootCD=2+Math.random();
        e.alertTimer=3;
      }
      // melee
      if(dp<18&&player.invincible<=0){
        player.hp-=8*dt; if(player.hp<=0){player.hp=0;gameOver();}
      }
    }
    e.x=clamp(e.x,20,WS-20); e.y=clamp(e.y,20,WS-20);
  });

  // ── Mission start ─────────────────────────────
  if(keyPressed('mission')){
    if(activeMission===-1){
      for(let i=0;i<MISSIONS.length;i++){
        const m=MISSIONS[i];
        if(m.state==='idle'&&dist(player,{x:m.markerX,y:m.markerY})<60){
          m.state='active'; activeMission=i;
          showNotif(`🎯 MISSION STARTED: ${m.title}`,3000);
          break;
        }
      }
    }
  }

  // ── Wanted decay ─────────────────────────────
  if(player.wanted>0&&!keys.shoot){
    // slow decay if out of sight
    const nearEnemy=ENEMIES.some(e=>!e.dead&&dist(e,player)<200);
    if(!nearEnemy) player.wantedDecay=(player.wantedDecay||0)+dt;
    else player.wantedDecay=0;
    if((player.wantedDecay||0)>15){ player.wantedDecay=0; player.wanted=Math.max(0,player.wanted-1); }
  }

  // Update previous keys
  prevKeys={...keys};
}

// ── Mission complete ──────────────────────────────
function completeMission(){
  const m=MISSIONS[activeMission];
  m.state='complete';
  player.money+=m.reward;
  showNotif(`✅ MISSION COMPLETE! +$${m.reward}`, 3500);
  activeMission=-1;
}

// ── Game over ─────────────────────────────────────
function gameOver(){
  showNotif('💀 WASTED! Respawning...', 2500);
  setTimeout(()=>{
    player.hp=100; player.x=WS/2; player.y=WS/2;
    player.inVehicle=null; player.wanted=0;
    player.money=Math.max(0,player.money-500);
  },2500);
}

// ── DRAW ─────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);

  // Camera follows player
  cam.x = clamp(player.x-W/2, 0, WS-W);
  cam.y = clamp(player.y-H/2, 0, WS-H);

  ctx.save();
  ctx.translate(-cam.x,-cam.y);

  // ── Tiles ──────────────────────────────────────
  const startC=Math.floor(cam.x/TILE), endC=Math.min(startC+Math.ceil(W/TILE)+1,WORLD);
  const startR=Math.floor(cam.y/TILE), endR=Math.min(startR+Math.ceil(H/TILE)+1,WORLD);
  for(let r=startR;r<endR;r++){
    for(let c=startC;c<endC;c++){
      const t=MAP_DATA[r][c];
      ctx.fillStyle=TILE_COLORS[t];
      ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
      ctx.strokeStyle=TILE_STROKE[t];
      ctx.lineWidth=0.5;
      ctx.strokeRect(c*TILE,r*TILE,TILE,TILE);
      // Road markings
      if(t===0){
        ctx.strokeStyle='rgba(255,255,255,.15)';
        ctx.setLineDash([8,12]);
        ctx.lineWidth=1.5;
        ctx.beginPath();
        if(r%6===0){ctx.moveTo(c*TILE+TILE/2,r*TILE);ctx.lineTo(c*TILE+TILE/2,r*TILE+TILE);}
        else{ctx.moveTo(c*TILE,r*TILE+TILE/2);ctx.lineTo(c*TILE+TILE,r*TILE+TILE/2);}
        ctx.stroke(); ctx.setLineDash([]);
      }
      // Gas station marker
      if(t===4){
        ctx.fillStyle='#ffee00';
        ctx.font='bold 18px Rajdhani';
        ctx.fillText('⛽',c*TILE+TILE/2-10,r*TILE+TILE/2+7);
      }
      // Park
      if(t===3){
        ctx.fillStyle='rgba(50,160,60,.4)';
        ctx.fillRect(c*TILE+4,r*TILE+4,TILE-8,TILE-8);
      }
    }
  }

  // ── Buildings (top-down with height illusion) ──
  BUILDINGS.forEach(b=>{
    if(b.x+b.w<cam.x||b.x>cam.x+W||b.y+b.h<cam.y||b.y>cam.y+H)return;
    const shade=clamp(b.height/100,0.3,1);
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.fillRect(b.x+6,b.y+6,b.w,b.h);
    // Roof
    ctx.fillStyle=b.color;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    // Roof highlight
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.fillRect(b.x,b.y,b.w,b.h/3);
    // Windows
    if(b.windows){
      ctx.fillStyle='rgba(255,230,100,.6)';
      for(let wy=b.y+5;wy<b.y+b.h-8;wy+=10){
        for(let wx=b.x+5;wx<b.x+b.w-5;wx+=10){
          ctx.fillRect(wx,wy,5,5);
        }
      }
    }
  });

  // ── Mission markers ────────────────────────────
  MISSIONS.forEach((m,i)=>{
    if(m.state==='complete') return;
    const pulse=0.7+0.3*Math.sin(Date.now()*0.004+i);
    ctx.save();
    ctx.globalAlpha=pulse;
    ctx.fillStyle= m.state==='active'?'#ffd700':'#00ff88';
    ctx.beginPath();
    ctx.arc(m.markerX, m.markerY, 18, 0, τ);
    ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.8)';
    ctx.font='bold 11px Oswald';
    ctx.textAlign='center';
    ctx.fillText(i+1, m.markerX, m.markerY+4);
    ctx.globalAlpha=1;
    ctx.restore();
    // Deliver marker
    if(m.state==='active'&&m.deliverX){
      ctx.fillStyle='rgba(255,100,0,.8)';
      ctx.beginPath(); ctx.arc(m.deliverX,m.deliverY,16,0,τ); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 10px Oswald'; ctx.textAlign='center';
      ctx.fillText('DROP',m.deliverX,m.deliverY+4);
    }
  });

  // ── Vehicle shadows ────────────────────────────
  VEHICLES.forEach(v=>{ drawIsoCar(v.x,v.y,v.angle,v.color,v.type,true); });

  // ── Vehicles ───────────────────────────────────
  VEHICLES.forEach(v=>{
    drawIsoCar(v.x,v.y,v.angle,v.color,v.type,false);
    // Fuel indicator if low
    if(v.fuel<v.maxFuel*0.2){
      ctx.fillStyle='#ff4400';
      ctx.font='12px Rajdhani';
      ctx.textAlign='center';
      ctx.fillText('⛽LOW',v.x,v.y-28);
    }
    // Vehicle name
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.font='10px Rajdhani';
    ctx.textAlign='center';
    ctx.fillText(v.name,v.x,v.y+(v.type==='bike'?22:30));
  });

  // ── NPCs ───────────────────────────────────────
  NPCS.forEach(n=>{
    drawHumanoid(n.x,n.y,n.angle,n.color,'#888',8);
    if(n.scared){
      ctx.fillStyle='#ff0'; ctx.font='12px Rajdhani'; ctx.textAlign='center';
      ctx.fillText('😱',n.x,n.y-18);
    }
  });

  // ── Enemies ────────────────────────────────────
  ENEMIES.forEach(e=>{
    if(e.dead)return;
    drawHumanoid(e.x,e.y,e.angle,e.color,e.outline,10);
    // Health bar
    const bw=24, bh=4;
    ctx.fillStyle='#300'; ctx.fillRect(e.x-bw/2,e.y-20,bw,bh);
    ctx.fillStyle='#f33'; ctx.fillRect(e.x-bw/2,e.y-20,bw*(e.hp/e.maxHp),bh);
    // Alert
    if(e.state==='chase'||(e.alertTimer&&e.alertTimer-->0)){
      ctx.fillStyle='#ff0'; ctx.font='12px Rajdhani'; ctx.textAlign='center';
      ctx.fillText('!',e.x,e.y-24);
    }
  });

  // ── Player ─────────────────────────────────────
  if(!player.inVehicle){
    const flash = player.invincible>0 && Math.floor(Date.now()/100)%2===0;
    if(!flash) drawHumanoid(player.x,player.y,player.angle,'#4dff91','#00cc66',10);
  }

  // ── Bullets ────────────────────────────────────
  BULLETS.forEach(b=>{
    ctx.fillStyle=b.fromPlayer?'#ffff00':'#ff4400';
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,τ); ctx.fill();
    ctx.fillStyle=b.fromPlayer?'rgba(255,255,0,.3)':'rgba(255,60,0,.3)';
    ctx.beginPath(); ctx.arc(b.x,b.y,7,0,τ); ctx.fill();
  });

  ctx.restore();

  // ── Minimap ────────────────────────────────────
  const ms=110, sc=ms/WS;
  mctx.clearRect(0,0,ms,ms);
  mctx.fillStyle='#111'; mctx.fillRect(0,0,ms,ms);
  // roads
  for(let r=0;r<WORLD;r++) for(let c=0;c<WORLD;c++){
    if(MAP_DATA[r][c]===0){ mctx.fillStyle='#333'; mctx.fillRect(c*TILE*sc,r*TILE*sc,TILE*sc,TILE*sc); }
    if(MAP_DATA[r][c]===4){ mctx.fillStyle='#e80'; mctx.fillRect(c*TILE*sc,r*TILE*sc,TILE*sc,TILE*sc); }
  }
  // enemies
  ENEMIES.forEach(e=>{ if(!e.dead){mctx.fillStyle='#f33';mctx.fillRect(e.x*sc-2,e.y*sc-2,4,4);} });
  // missions
  MISSIONS.forEach(m=>{ if(m.state!=='complete'){mctx.fillStyle='#ffd700';mctx.beginPath();mctx.arc(m.markerX*sc,m.markerY*sc,4,0,τ);mctx.fill();} });
  // player
  mctx.fillStyle='#4dff91'; mctx.beginPath(); mctx.arc(player.x*sc,player.y*sc,5,0,τ); mctx.fill();
  // viewport box
  mctx.strokeStyle='rgba(255,255,255,.4)';
  mctx.lineWidth=1;
  mctx.strokeRect(cam.x*sc,cam.y*sc,W*sc,H*sc);
}

// ── HUD update ────────────────────────────────────
function updateHUD(){
  document.getElementById('money-val').textContent='$'+player.money.toLocaleString();
  for(let i=1;i<=5;i++){
    const s=document.getElementById('s'+i);
    s.classList.toggle('on',i<=player.wanted);
  }
  const veh=player.inVehicle!==null?VEHICLES[player.inVehicle]:null;
  const spd=veh?Math.abs(veh.speed)*18:Math.abs(player.speed||0)*18;
  document.getElementById('speed-val').textContent=Math.round(spd);
  document.getElementById('hp-fill').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('hp-fill').style.background=player.hp>50?'linear-gradient(90deg,#4dff91,#00cc66)':player.hp>25?'linear-gradient(90deg,#ffaa00,#ff6600)':'linear-gradient(90deg,#ff3333,#cc0000)';
  document.getElementById('fuel-fill').style.width=veh?(veh.fuel/veh.maxFuel*100)+'%':'100%';
  document.getElementById('vehicle-name').textContent=veh?veh.name.toUpperCase():'ON FOOT';
  document.getElementById('vehicle-gear').textContent=veh?(veh.speed>0.5?`▶ ${veh.type.toUpperCase()}`:veh.speed<-0.5?'◀ REVERSE':'■ STOPPED'):'WALKING';

  // Mission box
  const mb=document.getElementById('mission-box');
  if(activeMission>=0){
    const m=MISSIONS[activeMission];
    mb.style.display='block';
    document.getElementById('mission-title').textContent=m.title;
    document.getElementById('mission-desc').textContent=m.desc;
    document.getElementById('mission-progress').textContent=m.killsNeeded?`${m.done}/${m.need} eliminated`:'';
  } else {
    // Show nearest idle mission hint
    let nearestM=null, nearestD=Infinity;
    MISSIONS.forEach(m=>{ if(m.state==='idle'){const d=dist(player,{x:m.markerX,y:m.markerY});if(d<100&&d<nearestD){nearestD=d;nearestM=m;}} });
    if(nearestM){ mb.style.display='block'; document.getElementById('mission-title').textContent='PRESS MISSION'; document.getElementById('mission-desc').textContent=nearestM.title; document.getElementById('mission-progress').textContent=''; }
    else mb.style.display='none';
  }

  // Notification
  if(notifTimer>0){
    notifTimer-=16;
    if(notifTimer<=0){ document.getElementById('notif').style.display='none'; }
  }
}

// ── Main loop ─────────────────────────────────────
function loop(ts){
  update(ts);
  draw();
  updateHUD();
  requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('screen-overlay').style.display='none';
  document.getElementById('hud').style.display='block';
  showNotif('🎮 WELCOME TO STREET LEGENDS!', 2500);
  requestAnimationFrame(loop);
}
</script>
